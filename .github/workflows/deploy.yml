name: Deploy HCTheme to cPanel
   on:
     push:
       branches: [main]

   jobs:
     deploy:
       runs-on: ubuntu-latest
       steps:
         - uses: actions/checkout@v4

         - name: Deploy via FTP
           uses: SamKirkland/FTP-Deploy-Action@v4.3.5
           with:
             server: ftp.esperansa.tv
             username: ${{ secrets.FTP_USER }}
             password: ${{ secrets.FTP_PASS }}
             server-dir: /public_html/wp-content/themes/HCTheme/
             exclude: |
               **/.git*
               **/.git*/**
               **/.github/**
               **/node_modules/**
               README.md
               .cpanel.yml
